name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5.0.0
        with:
          run_install: false
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: derive release metadata
        id: metadata
        shell: bash
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")
          EXPECTED_TAG="v${VERSION}"

          if [[ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Git tag ${GITHUB_REF_NAME} does not match package version ${EXPECTED_TAG}" >&2
            exit 1
          fi

          if [[ "${VERSION}" == *-* ]]; then
            DIST_TAG="${VERSION#*-}"
            DIST_TAG="${DIST_TAG%%.*}"
            PRERELEASE=true
          else
            DIST_TAG=latest
            PRERELEASE=false
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "dist_tag=${DIST_TAG}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${PRERELEASE}" >> "${GITHUB_OUTPUT}"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - name: publish to npm
        shell: bash
        run: |
          if [[ "${{ steps.metadata.outputs.dist_tag }}" == "latest" ]]; then
            npm publish
          else
            npm publish --tag "${{ steps.metadata.outputs.dist_tag }}"
          fi
      - name: create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${{ steps.metadata.outputs.prerelease }}" == "true" ]]; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              --prerelease
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi
