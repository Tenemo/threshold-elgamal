name: ci

on:
  push:
    branches:
      - master
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/bootstrap-pnpm
      - run: pnpm run check
      - run: pnpm run test:node
      - run: pnpm run build:dist

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/bootstrap-pnpm
      - run: pnpm run coverage:node

  browser:
    name: browser
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/bootstrap-pnpm
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm run test:browser
      - run: pnpm exec tsx ./tools/ci/verify-browser-compat.ts

  docs:
    name: docs
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/bootstrap-pnpm
      - run: pnpm run verify:docs
      - run: pnpm run docs:build:site

  release-smoke:
    name: release smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/bootstrap-pnpm
      - run: pnpm run build:dist
      - run: pnpm run verify:docs
      - run: pnpm run docs:build:site
      - run: pnpm run smoke:pack
