name: Bootstrap pnpm
description: Set up pnpm, install Node from .nvmrc, and install dependencies

runs:
    using: composite
    steps:
        - uses: pnpm/action-setup@v5.0.0
          with:
              run_install: false
        - uses: actions/setup-node@v6.3.0
          with:
              node-version-file: .nvmrc
              cache: pnpm
        - shell: bash
          run: pnpm install --frozen-lockfile
